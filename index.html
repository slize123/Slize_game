<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Slize | 2D онлайн выживание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a2a0a, #0a1a0a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 0 4px #d4a547, 0 20px 40px rgba(0,0,0,0.6);
        }

        canvas {
            display: block;
            cursor: crosshair;
            background: #2d5a2a;
        }

        /* Панель статуса (ХП и стамина под игроком) */
        #playerStats {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            gap: 30px;
            z-index: 100;
            font-family: monospace;
            font-weight: bold;
            border: 1px solid #d4a547;
            pointer-events: none;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffdd99;
            font-size: 16px;
        }

        .statBar {
            width: 120px;
            height: 12px;
            background: #330000;
            border-radius: 20px;
            overflow: hidden;
        }

        .statFill {
            height: 100%;
            transition: width 0.1s linear;
        }

        .healthFill {
            background: #ff4444;
        }

        .staminaFill {
            background: #44ff44;
        }

        #staminaText {
            font-size: 12px;
            color: #aaffaa;
        }

        /* Инвентарь (Tab) */
        #inventoryPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 500px;
            background: rgba(10,10,5,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 2px solid #d4a547;
            padding: 20px;
            z-index: 200;
            transition: transform 0.2s ease;
            font-family: monospace;
            pointer-events: auto;
        }

        #inventoryPanel.open {
            transform: translate(-50%, -50%) scale(1);
        }

        #inventoryPanel h3 {
            color: #ffd966;
            text-align: center;
            margin-bottom: 15px;
        }

        .invGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .invSlot {
            background: rgba(0,0,0,0.6);
            border: 1px solid #8a6a3a;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            color: #ffecb3;
            font-size: 14px;
        }

        .invSlot .icon {
            font-size: 28px;
        }

        /* Панель крафта (C) */
        #craftPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 550px;
            background: rgba(10,10,5,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 2px solid #6ab04c;
            padding: 20px;
            z-index: 200;
            transition: transform 0.2s ease;
            font-family: monospace;
            max-height: 80vh;
            overflow-y: auto;
            pointer-events: auto;
        }

        #craftPanel.open {
            transform: translate(-50%, -50%) scale(1);
        }

        .craftGrid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .craftItem {
            background: #2a2a1a;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #6a8a4a;
        }

        .craftItem:hover {
            background: #4a6a2a;
            transform: translateX(-2px);
        }

        .closePanel {
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
            color: #ffaa66;
        }

        /* Онлайн счётчик */
        #onlineBox {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            color: #7eff9e;
            font-weight: bold;
            font-family: monospace;
            z-index: 100;
            font-size: 14px;
        }

        /* Меню входа */
        #joinScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0a2f0a, #051005);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }

        .serverCard {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd966;
            min-width: 340px;
        }

        .serverCard h1 {
            font-size: 56px;
            color: #ffd966;
            text-shadow: 0 0 15px #ffaa33;
        }

        .playBtn {
            background: #4a7a3a;
            font-size: 32px;
            padding: 15px 50px;
            border-radius: 60px;
            color: #ffecb3;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        #closeInv, #closeCraft {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="joinScreen">
        <div class="serverCard">
            <h1>⚔️ SLIZE ⚔️</h1>
            <div style="font-size: 22px; margin: 15px 0; color:#b8ffb0;">🇪🇺 EU Slize</div>
            <button class="playBtn" id="playBtn">▶ ИГРАТЬ</button>
            <div id="onlineCountDisplay" style="margin-top: 20px; color:#aaa;">👥 онлайн: --</div>
        </div>
    </div>

    <div id="gameContainer" style="display: none;">
        <canvas id="gameCanvas" width="1300" height="750"></canvas>
        <div id="playerStats">
            <div class="stat">
                ❤️ ХП
                <div class="statBar"><div class="statFill healthFill" id="healthFillBar" style="width: 100%"></div></div>
            </div>
            <div class="stat">
                ⚡ СТАМИНА
                <div class="statBar"><div class="statFill staminaFill" id="staminaFillBar" style="width: 100%"></div></div>
                <span id="staminaText">100</span>
            </div>
        </div>
        <div id="onlineBox">👥 <span id="playersOnline">1</span></div>
    </div>

    <div id="inventoryPanel">
        <div class="closePanel" id="closeInv">✖</div>
        <h3>📦 ИНВЕНТАРЬ [TAB]</h3>
        <div class="invGrid" id="invGrid"></div>
    </div>

    <div id="craftPanel">
        <div class="closePanel" id="closeCraft">✖</div>
        <h3>🔨 КРАФТ [C]</h3>
        <div class="craftGrid" id="craftGrid"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ------ НАСТРОЙКИ ------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let myId = null;
        let players = {};
        let walls = [];
        let resources = [];
        let animals = [];
        
        // Инвентарь
        let inventory = { wood: 8, stone: 4, iron: 0, emerald: 0, fuel: 1 };
        
        // Характеристики
        let myHealth = 100;
        let maxHealth = 100;
        let stamina = 100;
        let maxStamina = 100;
        let currentWeapon = { name: 'Кулак', damage: 8, staminaCost: 12 };
        
        let attacking = false;
        let attackCooldown = 0;
        
        let cameraX = 0, cameraY = 0;
        let myX = 0, myY = 0;
        
        const TILE_SIZE = 48;
        const WORLD_W = 35;
        const WORLD_H = 25;
        
        // Управление
        const keys = { w: false, s: false, a: false, d: false };
        
        // Сокет
        const socket = io();
        
        // ----- ОТРИСОВКА СПРАЙТОВ (красиво) -----
        function drawSprite(ctx, type, x, y, direction = 'down') {
            const size = TILE_SIZE - 4;
            if (type === 'player') {
                // Человек красиво
                ctx.shadowBlur = 6;
                ctx.fillStyle = '#e0aa7a';
                ctx.beginPath();
                ctx.ellipse(x + TILE_SIZE/2, y + TILE_SIZE/2 - 6, 12, 14, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#4a2a1a';
                ctx.fillRect(x + TILE_SIZE/2 - 6, y + TILE_SIZE/2 - 2, 12, 16);
                ctx.fillStyle = '#2a2a2a';
                ctx.beginPath();
                ctx.arc(x + TILE_SIZE/2 - 4, y + TILE_SIZE/2 - 8, 2.5, 0, Math.PI*2);
                ctx.arc(x + TILE_SIZE/2 + 4, y + TILE_SIZE/2 - 8, 2.5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffaa66';
                ctx.font = `${TILE_SIZE-10}px monospace`;
                ctx.fillText('⚔️', x + TILE_SIZE/2 - 8, y + TILE_SIZE/2 + 8);
            } else if (type === 'deer') {
                ctx.fillStyle = '#bb9966';
                ctx.beginPath();
                ctx.ellipse(x + TILE_SIZE/2, y + TILE_SIZE/2, 10, 12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#886633';
                ctx.fillText('🦌', x + TILE_SIZE/2 - 6, y + TILE_SIZE/2 + 4);
            } else if (type === 'wolf') {
                ctx.fillStyle = '#886666';
                ctx.beginPath();
                ctx.ellipse(x + TILE_SIZE/2, y + TILE_SIZE/2, 10, 12, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillText('🐺', x + TILE_SIZE/2 - 6, y + TILE_SIZE/2 + 4);
            } else if (type === 'bear') {
                ctx.fillStyle = '#8a5a3a';
                ctx.beginPath();
                ctx.ellipse(x + TILE_SIZE/2, y + TILE_SIZE/2, 14, 16, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillText('🐻', x + TILE_SIZE/2 - 8, y + TILE_SIZE/2 + 4);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawResource(ctx, type, x, y) {
            if (type === 'wood') {
                ctx.fillStyle = '#6b4a2a';
                ctx.fillRect(x+8, y+12, 10, 28);
                ctx.fillStyle = '#3c9a2a';
                ctx.beginPath();
                ctx.arc(x+TILE_SIZE/2, y+12, 12, 0, Math.PI*2);
                ctx.fill();
            } else if (type === 'stone') {
                ctx.fillStyle = '#777';
                ctx.fillRect(x+10, y+14, 26, 22);
            } else if (type === 'emerald') {
                ctx.fillStyle = '#2aff6a';
                ctx.fillRect(x+12, y+14, 22, 20);
                ctx.fillStyle = '#aaffcc';
                ctx.fillText('💎', x+18, y+32);
            } else if (type === 'barrel') {
                ctx.fillStyle = '#aa5a2a';
                ctx.fillRect(x+10, y+12, 28, 30);
                ctx.fillStyle = '#ffaa66';
                ctx.fillText('🛢️', x+16, y+34);
            }
        }
        
        function drawWall(x, y, type) {
            if (type === 'normal') {
                ctx.fillStyle = '#9a7a4a';
                ctx.fillRect(x, y, TILE_SIZE-2, TILE_SIZE-2);
                ctx.fillStyle = '#c9a05c';
                ctx.fillRect(x+5, y+5, TILE_SIZE-12, TILE_SIZE-12);
            } else {
                ctx.fillStyle = '#2a9a4a';
                ctx.fillRect(x, y, TILE_SIZE-2, TILE_SIZE-2);
                ctx.fillStyle = '#7affaa';
                ctx.fillRect(x+5, y+5, TILE_SIZE-12, TILE_SIZE-12);
            }
        }
        
        // Интерфейс
        function updateUI() {
            document.getElementById('healthFillBar').style.width = (myHealth / maxHealth * 100) + '%';
            document.getElementById('staminaFillBar').style.width = (stamina / maxStamina * 100) + '%';
            document.getElementById('staminaText').innerText = Math.floor(stamina);
            document.getElementById('playersOnline').innerText = Object.keys(players).length;
            // Обновление инвентаря в панели
            const invGrid = document.getElementById('invGrid');
            invGrid.innerHTML = '';
            for (let [res, count] of Object.entries(inventory)) {
                let icon = '🪵';
                if (res === 'stone') icon = '🪨';
                if (res === 'iron') icon = '⛏️';
                if (res === 'emerald') icon = '💎';
                if (res === 'fuel') icon = '🛢️';
                invGrid.innerHTML += `<div class="invSlot"><div class="icon">${icon}</div>${res}: ${count}</div>`;
            }
        }
        
        // Крафт список
        const craftRecipes = [
            { name: '🗡️ Деревянный меч', req: { wood: 10 }, resultWeapon: { name: 'Меч', damage: 14, staminaCost: 12 } },
            { name: '🪓 Каменный топор', req: { stone: 8 }, resultWeapon: { name: 'Топор', damage: 18, staminaCost: 14 } },
            { name: '⛏️ Железная кирка', req: { iron: 6 }, resultWeapon: { name: 'Кирка', damage: 22, staminaCost: 16 } },
            { name: '⛽ Бензопила', req: { wood: 8, iron: 3, fuel: 2 }, resultWeapon: { name: 'Бензопила', damage: 35, staminaCost: 20 } },
            { name: '🏹 Арбалет', req: { wood: 12, iron: 5 }, resultWeapon: { name: 'Арбалет', damage: 28, staminaCost: 18 } },
            { name: '🪔 Тотем', req: { stone: 15, emerald: 3 }, resultSpecial: 'totem' }
        ];
        
        function openCraft() {
            const craftGrid = document.getElementById('craftGrid');
            craftGrid.innerHTML = '';
            craftRecipes.forEach(rec => {
                const div = document.createElement('div');
                div.className = 'craftItem';
                let reqText = '';
                for (let [r, val] of Object.entries(rec.req)) reqText += `${r}:${val} `;
                div.innerHTML = `${rec.name}<br><span style="font-size:10px;">${reqText}</span>`;
                div.onclick = () => socket.emit('craft', { recipe: rec });
                craftGrid.appendChild(div);
            });
            document.getElementById('craftPanel').classList.add('open');
        }
        
        // Атака
        function attack() {
            if (attackCooldown > 0 || stamina < currentWeapon.staminaCost) return;
            stamina = Math.max(0, stamina - currentWeapon.staminaCost);
            attackCooldown = 12;
            attacking = true;
            socket.emit('attack', { damage: currentWeapon.damage });
            setTimeout(() => { attacking = false; }, 200);
            updateUI();
        }
        
        // Восстановление стамины
        setInterval(() => {
            if (stamina < maxStamina) stamina = Math.min(maxStamina, stamina + 0.8);
            updateUI();
            if (attackCooldown > 0) attackCooldown--;
        }, 100);
        
        // Управление
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = true;
            if (k === ' ' || k === 'space') { e.preventDefault(); attack(); }
            if (k === 'tab') { e.preventDefault(); document.getElementById('inventoryPanel').classList.toggle('open'); }
            if (k === 'c') { e.preventDefault(); openCraft(); }
        });
        window.addEventListener('keyup', (e) => { const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; });
        
        document.getElementById('closeInv').onclick = () => document.getElementById('inventoryPanel').classList.remove('open');
        document.getElementById('closeCraft').onclick = () => document.getElementById('craftPanel').classList.remove('open');
        
        // Сокеты
        socket.on('init', (data) => {
            myId = data.id;
            myX = data.x;
            myY = data.y;
            inventory = data.inventory;
            myHealth = data.health;
            stamina = 100;
            updateUI();
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            document.getElementById('onlineCountDisplay').innerText = `👥 онлайн: ${data.online}`;
        });
        
        socket.on('updatePlayers', (newPlayers) => { players = newPlayers; });
        socket.on('updateWalls', (newWalls) => { walls = newWalls; });
        socket.on('updateResources', (newRes) => { resources = newRes; });
        socket.on('updateAnimals', (newAnimals) => { animals = newAnimals; });
        
        socket.on('playerUpdate', (data) => {
            if (data.id === myId) {
                inventory = data.inventory;
                myHealth = data.health;
                updateUI();
            }
        });
        
        socket.on('attackEffect', (data) => {
            if (data.target === myId) myHealth = data.newHealth;
            updateUI();
        });
        
        // Движение
        function sendMove() {
            let dx = 0, dy = 0;
            if (keys.w) dy -= 1;
            if (keys.s) dy += 1;
            if (keys.a) dx -= 1;
            if (keys.d) dx += 1;
            if (dx !== 0 || dy !== 0) socket.emit('move', { dx, dy });
        }
        setInterval(sendMove, 50);
        
        // Рендер мира
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Камера
            if (players[myId]) {
                myX = players[myId].x;
                myY = players[myId].y;
                cameraX = myX * TILE_SIZE - canvas.width/2;
                cameraY = myY * TILE_SIZE - canvas.height/2;
            }
            
            for (let i = 0; i < WORLD_W; i++) {
                for (let j = 0; j < WORLD_H; j++) {
                    let x = i*TILE_SIZE - cameraX;
                    let y = j*TILE_SIZE - cameraY;
                    if (x + TILE_SIZE > 0 && x < canvas.width && y + TILE_SIZE > 0 && y < canvas.height) {
                        ctx.fillStyle = (i+j)%2 === 0 ? '#3c7a3a' : '#4a8a42';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
            
            // Ресурсы
            for (let r of resources) {
                let x = r.x*TILE_SIZE - cameraX, y = r.y*TILE_SIZE - cameraY;
                drawResource(ctx, r.type, x, y);
            }
            // Стены
            for (let w of walls) {
                let x = w.x*TILE_SIZE - cameraX, y = w.y*TILE_SIZE - cameraY;
                drawWall(x, y, w.type);
            }
            // Животные
            for (let a of animals) {
                let x = a.x*TILE_SIZE - cameraX, y = a.y*TILE_SIZE - cameraY;
                drawSprite(ctx, a.type, x, y);
            }
            // Игроки
            for (let id in players) {
                let p = players[id];
                let x = p.x*TILE_SIZE - cameraX, y = p.y*TILE_SIZE - cameraY;
                drawSprite(ctx, 'player', x, y);
                ctx.fillStyle = '#ffffffcc';
                ctx.font = '12px monospace';
                ctx.fillText(p.name || 'воин', x+10, y-6);
                // Полоска хп над игроком
                ctx.fillStyle = '#aa0000';
                ctx.fillRect(x+8, y-12, 40, 6);
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(x+8, y-12, 40 * (p.health/100), 6);
            }
            requestAnimationFrame(draw);
        }
        draw();
        
        document.getElementById('playBtn').onclick = () => {
            socket.emit('joinGame');
        };
    </script>
</body>
</html>
