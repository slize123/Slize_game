<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slize | Выживание в огромном мире</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Segoe UI', monospace; background: #0a1008; }
        canvas { display: block; cursor: crosshair; }
        #mainMenu { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a2a0a, #020502); z-index: 1000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .menuCard { text-align: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border-radius: 48px; padding: 40px 50px; border: 2px solid #ffd966; animation: fadeUp 0.6s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .gameTitle { font-size: 80px; font-weight: bold; color: #ffd966; text-shadow: 0 0 20px #ffaa33; letter-spacing: 6px; }
        .sub { color: #aaffaa; font-size: 18px; margin-bottom: 30px; }
        .nickInput { background: rgba(30,30,20,0.9); border: 1px solid #d4a547; border-radius: 60px; padding: 14px 24px; width: 280px; font-size: 18px; color: #ffecb3; text-align: center; outline: none; margin-bottom: 20px; }
        .playBtn { background: #4a7a3a; border: none; border-radius: 60px; padding: 14px 30px; font-size: 28px; font-weight: bold; color: #ffecb3; cursor: pointer; width: 100%; transition: 0.1s; }
        .playBtn:hover { background: #6a9a4a; transform: scale(1.02); }
        .onlineInfo { margin-top: 20px; color: #88ff88; font-size: 14px; }
        #nightOverlay { position: fixed; inset: 0; background: #000; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 1s; }
        #hud { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); border-radius: 30px; padding: 10px 24px; display: flex; gap: 30px; z-index: 100; border: 1px solid #d4a547; display: none; }
        .stat { display: flex; align-items: center; gap: 8px; color: #ffdd99; font-weight: bold; font-size: 14px; }
        .statBar { width: 100px; height: 10px; background: #330000; border-radius: 10px; overflow: hidden; }
        .statFill { height: 100%; transition: width 0.1s; }
        .healthFill { background: #ff4444; }
        .staminaFill { background: #44ff44; }
        .hungerFill { background: #ffaa44; }
        #levelBox { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 30px; color: #ffd966; font-weight: bold; z-index: 100; display: none; }
        #onlineBox { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 30px; color: #7eff9e; z-index: 100; display: none; }
        #invMenu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,16,8,0.96); backdrop-filter: blur(20px); border-radius: 24px; border: 2px solid #d4a547; padding: 20px; z-index: 200; display: none; min-width: 560px; }
        #invMenu h2 { text-align: center; color: #ffd966; margin-bottom: 16px; }
        .invGrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .invSlot { background: rgba(30,30,20,0.7); border: 1px solid #6a5a3a; border-radius: 12px; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 28px; position: relative; cursor: pointer; transition: 0.05s; }
        .invSlot.selected { border: 2px solid #ffaa00; box-shadow: 0 0 8px #ffaa00; background: #3a4a2a; }
        .invSlot .count { position: absolute; bottom: 4px; right: 6px; font-size: 12px; color: #ffd966; font-weight: bold; }
        .emptySlot { background: rgba(80,80,60,0.3); border: 1px dashed #5a5a3a; }
        .invHint { text-align: center; margin-top: 12px; font-size: 12px; color: #aaffaa; }
        #craftMenu { position: fixed; top: 50%; right: 20px; transform: translateY(-50%); background: rgba(10,16,8,0.96); backdrop-filter: blur(20px); border-radius: 24px; border: 2px solid #44aaff; padding: 20px; z-index: 200; display: none; min-width: 280px; }
        #craftMenu h2 { text-align: center; color: #44aaff; margin-bottom: 16px; }
        .recipeItem { background: #1a2a2a; padding: 10px; margin-bottom: 8px; border-radius: 12px; color: white; cursor: pointer; border: 1px solid #3a6a6a; }
        .recipeItem.disabled { opacity: 0.4; cursor: not-allowed; }
        .recipeName { font-weight: bold; }
        .recipeReq { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
<div id="mainMenu">
    <div class="menuCard">
        <div class="gameTitle">SLIZE</div>
        <div class="sub">огромный мир · выживание · постройка · PvP</div>
        <input type="text" id="nickInput" class="nickInput" placeholder="Ваш ник" maxlength="16">
        <button id="playButton" class="playBtn">▶ ИГРАТЬ</button>
        <div class="onlineInfo" id="menuOnline">👥 онлайн: --</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="nightOverlay"></div>

<div id="hud">
    <div class="stat">❤️ <div class="statBar"><div class="statFill healthFill" id="healthFill"></div></div></div>
    <div class="stat">⚡ <div class="statBar"><div class="statFill staminaFill" id="staminaFill"></div></div></div>
    <div class="stat">🍗 <div class="statBar"><div class="statFill hungerFill" id="hungerFill"></div></div></div>
</div>
<div id="levelBox">🏆 УР. <span id="levelVal">1</span></div>
<div id="onlineBox">👥 <span id="onlineCount">0</span></div>

<div id="invMenu">
    <h2>🎒 ИНВЕНТАРЬ [TAB]</h2>
    <div class="invGrid" id="invGrid"></div>
    <div class="invHint">🔹 ПКМ по еде — съесть | 🔹 ЛКМ по стене/костру/ТНТ — построить/взорвать | 🔹 E — подобрать предмет</div>
</div>

<div id="craftMenu">
    <h2>🔨 КРАФТ [C]</h2>
    <div id="craftList"></div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let socket = null;
        let myId = null;
        let worldW = 300, worldH = 300;
        const TILE = 48;
        let state = { players: {}, resources: [], buildings: [], mobs: [] };
        let recipes = [];
        let invOpen = false, craftOpen = false;
        let selectedSlot = -1;
        let keys = { w: false, s: false, a: false, d: false };
        let mouseAngle = 0;
        let camX = 0, camY = 0, targetCamX = 0, targetCamY = 0;
        let zoom = 1.0;
        let particles = [];

        // ЗАГРУЗКА ИЗОБРАЖЕНИЙ
        const images = {};
        const imageList = [
            'player','tree','stone','bush','cactus','snow_tree','gold','crystal','slime_goo',
            'wall','campfire','tnt','totem','wolf','bear','slime','wood_sword','pickaxe',
            'berry','meat','medkit','anti_poison','winter_hat','desert_turban','cloth','fur','gunpowder','drop_crate'
        ];
        let imagesLoaded = 0;
        function loadImages(callback) {
            if (imageList.length === 0) { callback(); return; }
            imageList.forEach(name => {
                const img = new Image();
                img.src = `images/${name}.png`;
                img.onload = () => { imagesLoaded++; if (imagesLoaded === imageList.length) callback(); };
                img.onerror = () => { console.warn(`Не загружено: ${name}.png`); imagesLoaded++; if (imagesLoaded === imageList.length) callback(); };
                images[name] = img;
            });
        }

        function drawImage(imgName, x, y, w, h) {
            const img = images[imgName];
            if (img && img.complete) {
                ctx.drawImage(img, x, y, w || TILE, h || TILE);
            } else {
                // fallback
                ctx.fillStyle = '#aaa';
                ctx.fillRect(x, y, TILE, TILE);
            }
        }

        function addParticle(x,y,color){
            particles.push({x,y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3-1, life:1, color});
        }
        function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        canvas.addEventListener('wheel', (e) => { e.preventDefault(); zoom *= (e.deltaY > 0 ? 0.95 : 1.05); zoom = Math.min(1.5, Math.max(0.7, zoom)); });

        document.getElementById('playButton').onclick = () => {
            let nick = document.getElementById('nickInput').value.trim();
            if(!nick) nick = `Воин${Math.floor(Math.random()*999)}`;
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('levelBox').style.display = 'block';
            document.getElementById('onlineBox').style.display = 'block';
            socket = io();
            
            loadImages(() => {
                console.log('Все спрайты загружены');
                socket.emit('login', { nickname: nick });
            });

            socket.on('init', (data) => {
                myId = data.id;
                worldW = data.worldW;
                worldH = data.worldH;
                recipes = data.recipes;
                targetCamX = data.x * TILE - canvas.width/2;
                targetCamY = data.y * TILE - canvas.height/2;
                renderCraftMenu();
            });
            socket.on('gameState', (newState) => {
                state = newState;
                if(myId && state.players[myId]){
                    const p = state.players[myId];
                    targetCamX = p.x * TILE - canvas.width/2;
                    targetCamY = p.y * TILE - canvas.height/2;
                    updateHUD();
                }
                if(invOpen) renderInv();
                if(craftOpen) renderCraftMenu();
            });
            socket.on('onlineCount', (c) => {
                document.getElementById('onlineCount').innerText = c;
                document.getElementById('menuOnline').innerHTML = `👥 онлайн: ${c}`;
            });
            socket.on('addParticle', (data) => { for(let i=0;i<8;i++) addParticle(data.x, data.y, data.color); });
            socket.on('pickupResult', (data) => { if(data.success && invOpen) renderInv(); });
        };

        function updateHUD(){
            if(!myId || !state.players[myId]) return;
            const p = state.players[myId];
            document.getElementById('healthFill').style.width = p.hp + '%';
            document.getElementById('staminaFill').style.width = p.stamina + '%';
            document.getElementById('hungerFill').style.width = p.hunger + '%';
            document.getElementById('levelVal').innerText = p.level || 1;
        }

        function renderInv(){
            if(!myId || !state.players[myId]) return;
            const inv = state.players[myId].inventory;
            const grid = document.getElementById('invGrid');
            grid.innerHTML = '';
            const icons = { wood:'🪵', stone:'🪨', berry:'🫐', meat:'🥩', wall:'🧱', campfire:'🔥', tnt:'💣', wood_sword:'🗡️', pickaxe:'⛏️', medkit:'💊', winter_hat:'🎩', desert_turban:'🧕', anti_poison:'🧪' };
            for(let i=0;i<20;i++){
                const item = inv[i];
                const slotDiv = document.createElement('div');
                slotDiv.className = 'invSlot' + (selectedSlot === i ? ' selected' : '');
                if(!item){
                    slotDiv.classList.add('emptySlot');
                    slotDiv.innerHTML = `<span style="opacity:0.4">⬚</span>`;
                } else {
                    const icon = icons[item.id] || '📦';
                    slotDiv.innerHTML = `${icon}<span class="count">${item.count}</span>`;
                }
                slotDiv.onclick = (()=>{ selectedSlot = i; renderInv(); });
                grid.appendChild(slotDiv);
            }
        }

        function renderCraftMenu(){
            if(!myId || !state.players[myId]) return;
            const inv = state.players[myId].inventory;
            const list = document.getElementById('craftList');
            list.innerHTML = '';
            const icons = { wood:'🪵', stone:'🪨', berry:'🫐', meat:'🥩', fur:'🧣', crystal:'💎', gold:'🪙', cloth:'🧥', slime_goo:'🟢', gunpowder:'💥' };
            recipes.forEach((r,idx)=>{
                let can = true;
                const reqText = r.req.map(req=>{
                    let have = 0;
                    inv.forEach(it=>{ if(it && it.id === req.item) have += it.count; });
                    if(have < req.count) can = false;
                    return `${icons[req.item]} ${have}/${req.count}`;
                }).join(' ');
                const div = document.createElement('div');
                div.className = 'recipeItem' + (can ? '' : ' disabled');
                div.innerHTML = `<div class="recipeName">${r.name}</div><div class="recipeReq">${reqText}</div>`;
                if(can) div.onclick = () => socket.emit('craft', idx);
                list.appendChild(div);
            });
        }

        window.addEventListener('keydown', (e) => {
            if(!socket || !myId) return;
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'ц') keys.w = true;
            if (k === 's' || k === 'ы') keys.s = true;
            if (k === 'a' || k === 'ф') keys.a = true;
            if (k === 'd' || k === 'в') keys.d = true;
            if (e.key === 'Tab') { e.preventDefault(); invOpen = !invOpen; document.getElementById('invMenu').style.display = invOpen ? 'block' : 'none'; if(invOpen) renderInv(); }
            if (k === 'c') { e.preventDefault(); e.stopPropagation(); craftOpen = !craftOpen; document.getElementById('craftMenu').style.display = craftOpen ? 'block' : 'none'; if(craftOpen) renderCraftMenu(); }
            if (k === 'e') { e.preventDefault(); socket.emit('pickupNearby'); }
        });
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'ц') keys.w = false;
            if (k === 's' || k === 'ы') keys.s = false;
            if (k === 'a' || k === 'ф') keys.a = false;
            if (k === 'd' || k === 'в') keys.d = false;
        });
        window.addEventListener('mousemove', (e) => {
            if(!myId || !state.players[myId]) return;
            const p = state.players[myId];
            const px = p.x * TILE - camX;
            const py = p.y * TILE - camY;
            mouseAngle = Math.atan2(e.clientY - py, e.clientX - px);
        });
        window.addEventListener('mousedown', (e) => {
            if(!socket || !myId) return;
            if(e.button === 0){
                if(invOpen && selectedSlot !== -1){
                    const item = state.players[myId].inventory[selectedSlot];
                    if(item && (item.id === 'wall' || item.id === 'campfire' || item.id === 'tnt')){
                        socket.emit('placeBuilding', { slotIndex: selectedSlot });
                        return;
                    }
                }
                socket.emit('attack');
            } else if(e.button === 2){
                if(invOpen && selectedSlot !== -1){
                    const item = state.players[myId].inventory[selectedSlot];
                    if(item && (item.id === 'berry' || item.id === 'meat' || item.id === 'medkit' || item.id === 'anti_poison')){
                        socket.emit('eat', { itemId: item.id });
                    }
                }
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());

        setInterval(() => {
            if(!socket || !myId) return;
            let dx=0, dy=0;
            if(keys.w) dy=-1;
            if(keys.s) dy=1;
            if(keys.a) dx=-1;
            if(keys.d) dx=1;
            if(dx!==0 || dy!==0) socket.emit('move', { dx, dy, angle: mouseAngle });
        }, 1000/30);

        function updateCam(){
            camX += (targetCamX - camX) * 0.15;
            camY += (targetCamY - camY) * 0.15;
        }

        function getBiomeColor(x,y){
            if(x<70 && y<70) return ['#f5e6c4','#e8d4a8'];
            if(x>230 && y>230) return ['#e0f0f8','#c8e0ec'];
            if(x>80 && x<220 && y>80 && y<220) return ['#2a6a1a','#1e5212'];
            if((x>60 && x<140 && y>150 && y<250) || (x>150 && y>60 && y<140)) return ['#5a7a4a','#4a6a3a'];
            return ['#5a9a3a','#4a882a'];
        }

        function drawResource(ctx, x, y, type){
            const imgName = type;
            drawImage(imgName, x, y);
        }

        function drawBuilding(ctx, x, y, type){
            drawImage(type, x, y);
        }

        function drawMob(ctx, x, y, mob){
            drawImage(mob.type, x, y);
        }

        function drawPlayer(ctx, x, y, pl, isMe, anim){
            drawImage('player', x, y);
            // HP бар поверх
            ctx.fillStyle = '#330000';
            ctx.fillRect(x + 6, y - 12, 36, 5);
            ctx.fillStyle = '#00aa00';
            ctx.fillRect(x + 6, y - 12, 36 * (pl.hp / 100), 5);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px monospace';
            ctx.fillText(pl.name, x + 20, y - 5);
        }

        let lastFrame = 0;
        function draw(){
            requestAnimationFrame(draw);
            if(!myId || !state.players[myId]) return;
            const now = Date.now() / 1000;
            const anim = now * 6;
            updateCam();
            const effZoom = zoom;
            const viewW = canvas.width / effZoom;
            const viewH = canvas.height / effZoom;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save();
            ctx.scale(effZoom, effZoom);
            ctx.translate(-camX, -camY);

            const startX = Math.max(0, Math.floor(camX / TILE) - 1);
            const startY = Math.max(0, Math.floor(camY / TILE) - 1);
            const endX = Math.min(worldW, Math.ceil((camX + viewW) / TILE) + 2);
            const endY = Math.min(worldH, Math.ceil((camY + viewH) / TILE) + 2);
            for(let x=startX; x<endX; x++){
                for(let y=startY; y<endY; y++){
                    const cols = getBiomeColor(x,y);
                    ctx.fillStyle = (x+y)%2===0 ? cols[0] : cols[1];
                    ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
                }
            }

            for(let b of state.buildings) drawBuilding(ctx, b.x*TILE, b.y*TILE, b.type);
            for(let r of state.resources) drawResource(ctx, r.x*TILE, r.y*TILE, r.type);
            for(let m of state.mobs) drawMob(ctx, m.x*TILE, m.y*TILE, m);

            for(let id in state.players){
                const pl = state.players[id];
                drawPlayer(ctx, pl.x*TILE, pl.y*TILE, pl, id===myId, anim);
            }

            for(let i=particles.length-1; i>=0; i--){
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.03;
                if(p.life<=0){ particles.splice(i,1); continue; }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        draw();
    })();
</script>
</body>
</html>
