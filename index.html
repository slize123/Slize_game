<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slize - Dynast Style</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background:#0a0f08; font-family: 'Segoe UI', monospace; overflow:hidden; }
        canvas { display:block; image-rendering:pixelated; background:#0f1a0f; }

        #mainMenu {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1a2f1a, #050a05);
            z-index: 1000; display: flex; align-items: center; justify-content: center; color: #fff;
        }
        .title { font-size: 82px; font-weight: bold; color: #ffdd88; text-shadow: 0 0 40px #ffaa00, 0 0 80px #ff5500; letter-spacing: 6px; }
        .subtitle { font-size: 22px; color: #aaffaa; margin: 10px 0 40px; }
        .loginBox {
            background: rgba(10,20,10,0.9); padding: 40px; border-radius: 20px; border: 3px solid #ffcc44;
            box-shadow: 0 0 30px #ffaa00;
        }
        input { width: 320px; padding: 14px; font-size: 18px; border-radius: 50px; border: 2px solid #ffcc44; background:#112211; color:#ffddaa; text-align:center; }
        button { margin-top:20px; width:100%; padding:16px; font-size:26px; background:#ff5500; color:white; border:none; border-radius:50px; cursor:pointer; font-weight:bold; }
        button:hover { background:#ff7733; transform:scale(1.05); }

        #hud { position:fixed; bottom:15px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.75); padding:10px 25px; border-radius:30px; border:2px solid #ffcc44; display:none; gap:25px; z-index:100; }
        .barContainer { display:flex; align-items:center; gap:8px; color:#ffdd99; font-weight:bold; }
        .bar { width:180px; height:18px; background:#330000; border-radius:10px; overflow:hidden; }
        .fill { height:100%; transition:width 0.2s; }

        #night { position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; z-index:5; transition:opacity 1.5s; }
    </style>
</head>
<body>

<div id="mainMenu">
    <div style="text-align:center">
        <div class="title">SLIZE</div>
        <div class="subtitle">2D SURVIVAL • DYNAST STYLE</div>
        <div class="loginBox">
            <input id="nick" placeholder="Никнейм" maxlength="16" value="Slayer">
            <button onclick="startGame()">▶ ИГРАТЬ</button>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>
<div id="night"></div>

<div id="hud">
    <div class="barContainer">❤️ <div class="bar"><div class="fill" id="hp" style="background:#e00;width:100%"></div></div></div>
    <div class="barContainer">🍖 <div class="bar"><div class="fill" id="hunger" style="background:#f80;width:100%"></div></div></div>
    <div class="barContainer">⚡ <div class="bar"><div class="fill" id="stamina" style="background:#0cf;width:100%"></div></div></div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let socket, myId, state = {}, camX = 0, camY = 0;
    const TILE = 48;
    let keys = {}, mouseX = 0, mouseY = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function startGame() {
        const nick = document.getElementById('nick').value.trim() || "Slayer" + Math.floor(Math.random()*999);
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';

        socket = io("http://localhost:3000");   // ← поменяй если сервер на другом порту

        socket.on('init', data => {
            myId = data.id;
        });

        socket.on('gameState', s => {
            state = s;
            updateHUD();
        });

        socket.on('onlineCount', c => console.log('Онлайн:', c));
    }

    // Управление
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mousedown', () => { if(socket && myId) socket.emit('attack'); });

    setInterval(() => {
        if (!socket || !myId) return;
        let dx = 0, dy = 0;
        if (keys['w'] || keys['ц']) dy = -1;
        if (keys['s'] || keys['ы']) dy = 1;
        if (keys['a'] || keys['ф']) dx = -1;
        if (keys['d'] || keys['в']) dx = 1;

        const p = state.players?.[myId];
        if (p) {
            const angle = Math.atan2(mouseY - (p.y * TILE - camY), mouseX - (p.x * TILE - camX));
            socket.emit('move', {dx, dy, angle});
        }
    }, 1000/30);

    function updateHUD() {
        if (!myId || !state.players?.[myId]) return;
        const p = state.players[myId];
        document.getElementById('hp').style.width = p.hp + '%';
        document.getElementById('hunger').style.width = (p.hunger || 100) + '%';
        document.getElementById('stamina').style.width = (p.stamina || 100) + '%';
    }

    // ==================== РЕНДЕР ====================
    function draw() {
        requestAnimationFrame(draw);
        if (!myId || !state.players?.[myId]) return;

        const p = state.players[myId];
        camX += ((p.x * TILE - canvas.width/2) - camX) * 0.15;
        camY += ((p.y * TILE - canvas.height/2) - camY) * 0.15;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-camX, -camY);

        // Земля + биомы
        const startX = Math.max(0, Math.floor(camX/TILE)-2);
        const startY = Math.max(0, Math.floor(camY/TILE)-2);
        const endX = Math.min(200, Math.ceil((camX+canvas.width)/TILE)+2);
        const endY = Math.min(200, Math.ceil((camY+canvas.height)/TILE)+2);

        for (let x = startX; x < endX; x++) {
            for (let y = startY; y < endY; y++) {
                let color = '#2a5a1a';
                if (x < 50 && y < 50) color = '#c9b38a';           // пустыня
                else if (x > 150 && y > 150) color = '#d0e0f0';   // снег
                else if (x > 65 && x < 135 && y > 65 && y < 135) color = '#1e3f1a'; // лес

                ctx.fillStyle = (x+y)%2 === 0 ? color : '#234d17';
                ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
            }
        }

        // Ресурсы (простая версия)
        (state.resources || []).forEach(r => {
            const rx = r.x * TILE + TILE/2;
            const ry = r.y * TILE + TILE/2;
            if (r.type === 'tree') {
                ctx.fillStyle = '#3a2a1a'; ctx.fillRect(rx-6, ry-8, 12, 28);
                ctx.fillStyle = '#0a5a0a'; ctx.beginPath(); ctx.arc(rx, ry-18, 18, 0, Math.PI*2); ctx.fill();
            } else if (r.type === 'stone') {
                ctx.fillStyle = '#666'; ctx.beginPath(); ctx.arc(rx, ry, 18, 0, Math.PI*2); ctx.fill();
            }
        });

        // Игроки
        Object.values(state.players || {}).forEach(pl => {
            const px = pl.x * TILE;
            const py = pl.y * TILE;
            const isMe = pl.id === myId;

            ctx.save();
            ctx.translate(px, py);

            // Тень
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.ellipse(0, 18, 14, 6, 0, 0, Math.PI*2); ctx.fill();

            // Тело
            ctx.fillStyle = isMe ? '#ffcc77' : '#cc9966';
            ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();

            // Голова
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath(); ctx.arc(0, -8, 9, 0, Math.PI*2); ctx.fill();

            // Оружие
            ctx.save();
            ctx.rotate(pl.angle || 0);
            ctx.fillStyle = '#555';
            ctx.fillRect(12, -4, 20, 8);
            ctx.restore();

            // Имя
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 13px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(pl.name || 'Player', 0, -32);

            ctx.restore();
        });

        ctx.restore();

        // Ночь
        const nightLevel = (Math.sin(Date.now()/70000) + 1) / 2 * 0.7;
        document.getElementById('night').style.opacity = nightLevel;
    }

    draw();
</script>
</body>
</html>
