<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slize | 2D онлайн игра на весь экран</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Courier New', monospace;
            background: #0a1008;
        }

        /* Главное меню */
        #mainMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a2a0a 0%, #030803 100%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .menuContainer {
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gameTitle {
            font-size: 72px;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 20px #ffaa33, 0 0 40px #ff8833;
            margin-bottom: 20px;
            letter-spacing: 8px;
        }

        .gameSub {
            font-size: 18px;
            color: #aaffaa;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .loginBox {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 40px;
            border: 2px solid #d4a547;
            display: inline-block;
            min-width: 350px;
        }

        .googleBtn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 18px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            font-weight: bold;
            transition: 0.1s;
            margin-bottom: 20px;
        }

        .googleBtn:hover {
            background: #5a95f4;
            transform: scale(1.02);
        }

        .nickInput {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 40px;
            border: 1px solid #d4a547;
            background: rgba(20,20,10,0.9);
            color: #ffecb3;
            text-align: center;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .playBtn {
            background: #4a7a3a;
            color: #ffecb3;
            border: none;
            padding: 14px 32px;
            font-size: 24px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.05s linear;
        }

        .playBtn:hover {
            background: #6a9a4a;
            transform: scale(1.02);
        }

        .onlineInfo {
            margin-top: 20px;
            color: #88ff88;
            font-size: 14px;
        }

        /* Игровой интерфейс */
        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        /* HUD */
        #hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 20px;
            border: 1px solid #d4a547;
            font-family: monospace;
            color: #ffdd99;
            display: flex;
            gap: 25px;
            font-weight: bold;
            font-size: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .statBar {
            width: 100px;
            height: 8px;
            background: #330000;
            border-radius: 10px;
            overflow: hidden;
        }

        .statFill {
            height: 100%;
            transition: width 0.1s;
        }
        .healthFill { background: #ff4444; }
        .staminaFill { background: #44ff44; }
        .expFill { background: #ffaa44; }

        #levelBox {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            color: #ffd966;
            font-weight: bold;
            font-family: monospace;
            z-index: 100;
        }

        #onlineBox {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            color: #7eff9e;
            font-family: monospace;
            z-index: 100;
        }

        #inventoryPanel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #d4a547;
            z-index: 100;
            min-width: 280px;
        }

        .invTitle {
            color: #ffd966;
            font-size: 12px;
            text-align: center;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .invGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .invCell {
            background: #2a2a1a;
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            font-size: 11px;
            color: #ffecb3;
            font-family: monospace;
            border: 1px solid #6a5a3a;
        }

        .invCell .icon {
            font-size: 20px;
            display: block;
        }

        #damagePopup {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            font-weight: bold;
            color: #ff6666;
            text-shadow: 0 0 5px black;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.1s;
        }
    </style>
</head>
<body>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="mainMenu">
    <div class="menuContainer">
        <div class="gameTitle">⚔️ SLIZE ⚔️</div>
        <div class="gameSub">2D Online Survival</div>
        <div class="loginBox">
            <input type="text" id="nicknameInput" class="nickInput" placeholder="Введите никнейм" maxlength="16">
            <button id="googleLoginBtn" class="googleBtn">🔐 Войти через Gmail</button>
            <button id="playGuestBtn" class="playBtn">▶ ИГРАТЬ ГОСТЕМ</button>
            <div class="onlineInfo" id="menuOnlineInfo">👥 онлайн: --</div>
        </div>
    </div>
</div>

<!-- ИГРОВОЙ КОНТЕЙНЕР -->
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div class="stat">❤️ <div class="statBar"><div class="statFill healthFill" id="healthFill"></div></div></div>
        <div class="stat">⚡ <div class="statBar"><div class="statFill staminaFill" id="staminaFill"></div></div></div>
        <div class="stat">⭐ <div class="statBar"><div class="statFill expFill" id="expFill"></div></div></div>
    </div>
    
    <div id="levelBox">🏆 УРОВЕНЬ <span id="levelVal">1</span></div>
    <div id="onlineBox">👥 <span id="onlineCount">1</span></div>
    
    <div id="inventoryPanel">
        <div class="invTitle">📦 ИНВЕНТАРЬ</div>
        <div class="invGrid" id="invGrid"></div>
    </div>
    
    <div id="damagePopup"></div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
    // ========== НАСТРОЙКИ ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let socket = null;
    let myId = null;
    let players = {};
    let resources = [];
    let trees = [];
    let stones = [];
    let golds = [];
    let chests = [];
    
    let myX = 0, myY = 0;
    let myHealth = 100;
    let myStamina = 100;
    let myExp = 0;
    let myLevel = 1;
    let myMaxExp = 100;
    let myDamage = 10;
    let inventory = [];
    
    let cameraX = 0, cameraY = 0;
    let attackCooldown = 0;
    let walkAnim = 0;
    let playerDirection = 'down';
    
    // Управление
    const keys = { w: false, s: false, a: false, d: false };
    
    // Размеры карты (большая!)
    const WORLD_W = 80;
    const WORLD_H = 60;
    const TILE_SIZE = 48;
    
    // ========== БИОМЫ (разные цвета) ==========
    function getBiome(x, y) {
        const centerX = WORLD_W/2, centerY = WORLD_H/2;
        const dist = Math.hypot(x - centerX, y - centerY);
        if (dist < 15) return { name: 'center', ground: '#8aaa6a', dark: '#7a9a5a', tree: '#3c9a2a' };
        if (dist < 25) return { name: 'forest', ground: '#4a7a3a', dark: '#3a6a2a', tree: '#2a7a1a' };
        if (dist < 35) return { name: 'plains', ground: '#6a9a4a', dark: '#5a8a3a', tree: '#4aaa2a' };
        if (x < 20) return { name: 'desert', ground: '#c4a86a', dark: '#b49858', tree: '#8a6a3a' };
        if (x > WORLD_W - 20) return { name: 'snow', ground: '#aaccdd', dark: '#99bbcc', tree: '#88aacc' };
        return { name: 'swamp', ground: '#5a7a4a', dark: '#4a6a3a', tree: '#3a8a2a' };
    }
    
    // ========== ОТРИСОВКА ==========
    function drawGround() {
        for (let i = 0; i < WORLD_W; i++) {
            for (let j = 0; j < WORLD_H; j++) {
                const x = i * TILE_SIZE - cameraX;
                const y = j * TILE_SIZE - cameraY;
                if (x + TILE_SIZE > 0 && x < canvas.width && y + TILE_SIZE > 0 && y < canvas.height) {
                    const biome = getBiome(i, j);
                    ctx.fillStyle = (i + j) % 2 === 0 ? biome.ground : biome.dark;
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    
                    // Детали травы
                    if (Math.random() < 0.03) {
                        ctx.fillStyle = '#aaffaa';
                        ctx.fillRect(x + Math.random() * TILE_SIZE, y + Math.random() * TILE_SIZE, 2, 2);
                    }
                }
            }
        }
    }
    
    function drawResource(type, x, y, variant) {
        ctx.shadowBlur = 4;
        ctx.shadowColor = '#00000066';
        
        if (type === 'tree') {
            ctx.fillStyle = '#6b4a2a';
            ctx.fillRect(x + 16, y + 20, 12, 32);
            ctx.fillStyle = variant || '#3c9a2a';
            ctx.beginPath();
            ctx.arc(x + 22, y + 18, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2a7a1a';
            ctx.beginPath();
            ctx.arc(x + 18, y + 12, 10, 0, Math.PI * 2);
            ctx.fill();
        } else if (type === 'stone') {
            ctx.fillStyle = '#888';
            ctx.fillRect(x + 10, y + 16, 32, 28);
            ctx.fillStyle = '#aaa';
            ctx.fillRect(x + 16, y + 20, 20, 20);
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = '#666';
                ctx.fillRect(x + 14 + i * 8, y + 28, 4, 8);
            }
        } else if (type === 'gold') {
            ctx.fillStyle = '#d4af37';
            ctx.fillRect(x + 12, y + 14, 28, 30);
            ctx.fillStyle = '#ffd700';
            ctx.fillText('⭐', x + 20, y + 34);
        } else if (type === 'chest') {
            ctx.fillStyle = '#8a6a3a';
            ctx.fillRect(x + 10, y + 16, 32, 24);
            ctx.fillStyle = '#d4a547';
            ctx.fillRect(x + 14, y + 20, 24, 16);
            ctx.fillStyle = '#ffcc66';
            ctx.fillText('🎁', x + 20, y + 36);
        }
        ctx.shadowBlur = 0;
    }
    
    function drawPlayer(x, y, name, health, isMe, direction, anim, level) {
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#00000066';
        
        // Тело
        ctx.fillStyle = isMe ? '#ffcc88' : '#e09a5a';
        ctx.beginPath();
        ctx.ellipse(x + 24, y + 20, 14, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Ноги с анимацией
        const legOffset = anim ? 4 : 0;
        ctx.fillStyle = '#4a2a1a';
        ctx.fillRect(x + 18, y + 28 + legOffset, 6, 12);
        ctx.fillRect(x + 28, y + 28 - legOffset/2, 6, 12);
        
        // Голова
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(x + 20, y + 8, 8, 10);
        
        // Глаза
        ctx.fillStyle = '#2a2a2a';
        ctx.beginPath();
        ctx.arc(x + 20, y + 18, 3, 0, Math.PI * 2);
        ctx.arc(x + 28, y + 18, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + 19, y + 17, 1, 0, Math.PI * 2);
        ctx.arc(x + 27, y + 17, 1, 0, Math.PI * 2);
        ctx.fill();
        
        // Уровень над головой
        ctx.fillStyle = '#ffd966';
        ctx.font = 'bold 10px monospace';
        ctx.fillText(`Lv.${level}`, x + 18, y - 8);
        
        // Имя
        ctx.fillStyle = '#ffffffcc';
        ctx.font = 'bold 11px monospace';
        ctx.fillText(name, x + 12, y - 2);
        
        // Полоска HP
        ctx.fillStyle = '#aa0000';
        ctx.fillRect(x + 6, y - 14, 40, 5);
        ctx.fillStyle = '#00aa00';
        ctx.fillRect(x + 6, y - 14, 40 * (health / 100), 5);
        
        ctx.shadowBlur = 0;
    }
    
    // ========== ИНВЕНТАРЬ ==========
    function updateInventoryUI() {
        const grid = document.getElementById('invGrid');
        if (!grid) return;
        grid.innerHTML = '';
        for (let i = 0; i < 12; i++) {
            const item = inventory[i] || { name: 'empty', count: 0 };
            const icons = { wood: '🪵', stone: '🪨', gold: '🪙', meat: '🍖', crystal: '💎', empty: '⬜' };
            grid.innerHTML += `<div class="invCell"><span class="icon">${icons[item.name] || '📦'}</span>${item.count > 0 ? item.count : ''}</div>`;
        }
    }
    
    function addToInventory(itemName, amount) {
        for (let i = 0; i < inventory.length; i++) {
            if (inventory[i] && inventory[i].name === itemName) {
                inventory[i].count += amount;
                updateInventoryUI();
                return;
            }
        }
        for (let i = 0; i < 12; i++) {
            if (!inventory[i] || inventory[i].name === 'empty') {
                inventory[i] = { name: itemName, count: amount };
                updateInventoryUI();
                return;
            }
        }
    }
    
    // ========== АТАКА ==========
    function attack() {
        if (attackCooldown > 0 || myStamina < 10) return;
        myStamina = Math.max(0, myStamina - 10);
        attackCooldown = 12;
        
        // Визуал удара
        const popup = document.getElementById('damagePopup');
        popup.style.opacity = '1';
        popup.style.left = canvas.width/2 - 20 + 'px';
        popup.style.top = canvas.height/2 - 40 + 'px';
        setTimeout(() => { popup.style.opacity = '0'; }, 150);
        
        socket.emit('attack', { damage: myDamage });
        updateUI();
    }
    
    // ========== UI ==========
    function updateUI() {
        document.getElementById('healthFill').style.width = (myHealth / 100 * 100) + '%';
        document.getElementById('staminaFill').style.width = (myStamina / 100 * 100) + '%';
        document.getElementById('expFill').style.width = (myExp / myMaxExp * 100) + '%';
        document.getElementById('levelVal').innerText = myLevel;
        document.getElementById('onlineCount').innerText = Object.keys(players).length;
    }
    
    // ========== ДВИЖЕНИЕ ==========
    function sendMove() {
        let dx = 0, dy = 0;
        if (keys.d) dx = 1;
        if (keys.a) dx = -1;
        if (keys.s) dy = 1;
        if (keys.w) dy = -1;
        
        if (dx !== 0 || dy !== 0) {
            if (dx > 0) playerDirection = 'right';
            else if (dx < 0) playerDirection = 'left';
            else if (dy > 0) playerDirection = 'down';
            else if (dy < 0) playerDirection = 'up';
            socket.emit('move', { dx, dy });
        }
        
        // Анимация ходьбы
        walkAnim = (walkAnim + 0.2) % Math.PI * 2;
    }
    setInterval(sendMove, 50);
    
    // Восстановление стамины и кулдауна
    setInterval(() => {
        if (myStamina < 100) myStamina = Math.min(100, myStamina + 1);
        if (attackCooldown > 0) attackCooldown--;
        updateUI();
    }, 100);
    
    // ========== УПРАВЛЕНИЕ ==========
    window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (keys.hasOwnProperty(k)) keys[k] = true;
    });
    window.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        if (keys.hasOwnProperty(k)) keys[k] = false;
    });
    
    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0) attack();
    });
    
    // ========== РАЗМЕР CANVAS НА ВЕСЬ ЭКРАН ==========
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // ========== СОКЕТЫ ==========
    function connectToGame(email, nickname, isGuest) {
        if (socket) socket.disconnect();
        socket = io();
        
        socket.on('connect', () => {
            socket.emit('login', { email, nickname, isGuest });
        });
        
        socket.on('init', (data) => {
            myId = data.id;
            myX = data.x;
            myY = data.y;
            inventory = data.inventory || [];
            myHealth = data.health;
            myLevel = data.level;
            myExp = data.exp;
            myDamage = 10 + (myLevel - 1) * 2;
            updateUI();
            updateInventoryUI();
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
        });
        
        socket.on('updatePlayers', (data) => { players = data; });
        socket.on('updateResources', (data) => { resources = data; });
        socket.on('playerUpdate', (data) => {
            if (data.id === myId) {
                myX = data.x;
                myY = data.y;
                myHealth = data.health;
                inventory = data.inventory;
                myExp = data.exp;
                myLevel = data.level;
                myDamage = 10 + (myLevel - 1) * 2;
                updateUI();
                updateInventoryUI();
            }
        });
        socket.on('attackEffect', (data) => {
            if (data.target === myId) {
                myHealth = data.newHealth;
                updateUI();
            }
        });
        socket.on('onlineCount', (count) => {
            document.getElementById('menuOnlineInfo').innerHTML = `👥 онлайн: ${count}`;
            document.getElementById('onlineCount').innerText = count;
        });
    }
    
    // ========== МЕНЮ ==========
    document.getElementById('playGuestBtn').onclick = () => {
        const nick = document.getElementById('nicknameInput').value.trim();
        if (!nick) {
            alert('Введите никнейм!');
            return;
        }
        connectToGame(null, nick, true);
    };
    
    document.getElementById('googleLoginBtn').onclick = () => {
        alert('🔐 Для демо-версии вход через Gmail симулирован.\nВ реальном проекте добавьте Google OAuth.');
        const nick = document.getElementById('nicknameInput').value.trim() || 'Player';
        connectToGame('demo@email.com', nick, false);
    };
    
    // ========== ОСНОВНОЙ ЦИКЛ ОТРИСОВКИ ==========
    function draw() {
        if (!canvas || !ctx) return;
        
        // Камера
        if (myId && players[myId]) {
            myX = players[myId].x;
            myY = players[myId].y;
            cameraX = myX * TILE_SIZE - canvas.width / 2;
            cameraY = myY * TILE_SIZE - canvas.height / 2;
            cameraX = Math.min(Math.max(cameraX, -TILE_SIZE * 5), WORLD_W * TILE_SIZE - canvas.width + TILE_SIZE * 5);
            cameraY = Math.min(Math.max(cameraY, -TILE_SIZE * 5), WORLD_H * TILE_SIZE - canvas.height + TILE_SIZE * 5);
        }
        
        drawGround();
        
        // Ресурсы
        for (let r of resources) {
            if (!r) continue;
            const x = r.x * TILE_SIZE - cameraX;
            const y = r.y * TILE_SIZE - cameraY;
            drawResource(r.type, x, y, r.variant);
        }
        
        // Игроки
        const anim = (walkAnim > 0);
        for (let id in players) {
            const p = players[id];
            const x = p.x * TILE_SIZE - cameraX;
            const y = p.y * TILE_SIZE - cameraY;
            drawPlayer(x, y, p.name, p.health, id === myId, playerDirection, anim && id === myId, p.level || 1);
        }
        
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
