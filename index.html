<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Slize | Онлайн игра как Dynast.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a1f0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 0 4px #c9a03d, 0 20px 40px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            cursor: crosshair;
            background: #2a5a2a;
        }

        /* Интерфейс как в Dynast */
        #statsPanel {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            z-index: 100;
            font-weight: bold;
            font-size: 14px;
            color: #ffdd99;
            border: 1px solid #dbb45c;
        }

        #onlineBox {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px;
            border-radius: 30px;
            color: #88ff88;
            font-weight: bold;
            z-index: 100;
        }

        #inventoryPanel, #craftPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #0a0a05f0;
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 2px solid #c9a03d;
            padding: 20px;
            z-index: 200;
            transition: transform 0.1s ease;
            min-width: 420px;
            font-family: monospace;
            color: #ffecb3;
        }

        #inventoryPanel.open, #craftPanel.open {
            transform: translate(-50%, -50%) scale(1);
        }

        .closePanel {
            position: absolute;
            top: 8px;
            right: 18px;
            cursor: pointer;
            font-size: 24px;
        }

        .gridList {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .itemSlot {
            background: #2a2a1a;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            border: 1px solid #8a6a3a;
            cursor: pointer;
        }

        .itemSlot:hover {
            background: #4a6a2a;
            transform: translateX(-2px);
        }

        #joinScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0a2f0a, #030803);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .serverCard {
            background: #000000cc;
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd966;
            min-width: 340px;
        }

        .serverCard h1 {
            font-size: 56px;
            color: #ffd966;
            text-shadow: 0 0 15px #ffaa33;
        }

        .playBtn {
            background: #4a7a3a;
            font-size: 32px;
            padding: 15px 50px;
            border-radius: 60px;
            color: #ffecb3;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div id="joinScreen">
    <div class="serverCard">
        <h1>⚔️ SLIZE ⚔️</h1>
        <div style="font-size: 22px; margin: 15px 0; color:#b8ffb0;">EU Slize #1</div>
        <button class="playBtn" id="playBtn">▶ ИГРАТЬ</button>
        <div id="onlineCountDisplay" style="margin-top: 20px; color:#aaa;">👥 онлайн: --</div>
    </div>
</div>

<div id="gameContainer" style="display: none;">
    <canvas id="gameCanvas" width="1300" height="750"></canvas>
    <div id="statsPanel">
        <div>❤️ <span id="healthVal">100</span> / 100</div>
        <div>⚡ <span id="staminaVal">100</span></div>
        <div>🪙 <span id="goldVal">0</span></div>
    </div>
    <div id="onlineBox">👥 <span id="playersOnline">1</span></div>
</div>

<div id="inventoryPanel">
    <div class="closePanel" id="closeInv">✖</div>
    <h3>📦 ИНВЕНТАРЬ [TAB]</h3>
    <div class="gridList" id="invGrid"></div>
</div>

<div id="craftPanel">
    <div class="closePanel" id="closeCraft">✖</div>
    <h3>🔨 КРАФТ [C]</h3>
    <div class="gridList" id="craftGrid"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TILE_SIZE = 48;
    let myId = null;
    let players = {};
    let walls = [];
    let resources = [];
    
    let inventory = { wood: 5, stone: 3, gold: 0, crystal: 0, cactus: 0, fern: 0, timerite: 0, meat: 0, feather: 0, dust: 0, web: 0, fur: 0, bone: 0 };
    let myHealth = 100;
    let stamina = 100;
    let currentWeapon = { name: 'Рука', damage: 8, staminaCost: 10 };
    let attackCooldown = 0;
    let cameraX = 0, cameraY = 0;
    let myX = 0, myY = 0;
    
    const keys = { w: false, s: false, a: false, d: false };
    const socket = io();
    
    // Отрисовка (стиль Dynast.io)
    function drawResource(ctx, type, x, y) {
        ctx.shadowBlur = 4;
        if (type === 'wood') { ctx.fillStyle = '#6b4a2a'; ctx.fillRect(x+10, y+12, 10, 28); ctx.fillStyle = '#3c9a2a'; ctx.beginPath(); ctx.arc(x+24, y+12, 12, 0, Math.PI*2); ctx.fill(); }
        else if (type === 'stone') { ctx.fillStyle = '#777'; ctx.fillRect(x+10, y+14, 28, 24); ctx.fillStyle = '#aaa'; ctx.fillRect(x+14, y+18, 20, 16); }
        else if (type === 'gold') { ctx.fillStyle = '#d4af37'; ctx.fillRect(x+8, y+12, 32, 28); ctx.fillStyle = '#ffd700'; ctx.fillText('⭐', x+18, y+32); }
        else if (type === 'crystal') { ctx.fillStyle = '#88aaff'; ctx.fillRect(x+10, y+10, 28, 30); ctx.fillStyle = '#ccddff'; ctx.fillText('❄️', x+18, y+32); }
        else if (type === 'cactus') { ctx.fillStyle = '#3a8a2a'; ctx.fillRect(x+16, y+8, 16, 36); ctx.fillStyle = '#aaffaa'; for(let i=0;i<3;i++) ctx.fillRect(x+20+i*2, y+20, 4, 8); }
        else if (type === 'fern') { ctx.fillStyle = '#4aaa3a'; ctx.beginPath(); ctx.moveTo(x+24, y+10); ctx.lineTo(x+14, y+35); ctx.lineTo(x+34, y+35); ctx.fill(); }
        else if (type === 'timerite') { ctx.fillStyle = '#aa4a6a'; ctx.fillRect(x+10, y+12, 28, 26); ctx.fillStyle = '#ff88aa'; ctx.fillText('💎', x+18, y+32); }
        ctx.shadowBlur = 0;
    }
    
    function drawPlayer(ctx, x, y, name, health, isMe) {
        ctx.shadowBlur = 5;
        ctx.fillStyle = isMe ? '#ffcc88' : '#e09a5a';
        ctx.beginPath(); ctx.ellipse(x+24, y+20, 14, 18, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#4a2a1a'; ctx.fillRect(x+18, y+28, 12, 16);
        ctx.fillStyle = '#2a2a2a'; ctx.beginPath(); ctx.arc(x+18, y+15, 3, 0, Math.PI*2); ctx.arc(x+30, y+15, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x+17, y+14, 1.2, 0, Math.PI*2); ctx.arc(x+29, y+14, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000000cc'; ctx.font = 'bold 12px monospace'; ctx.fillText(name, x+12, y-6);
        ctx.fillStyle = '#aa0000'; ctx.fillRect(x+8, y-10, 40, 6);
        ctx.fillStyle = '#00aa00'; ctx.fillRect(x+8, y-10, 40 * (health/100), 6);
        ctx.shadowBlur = 0;
    }
    
    function updateUI() {
        document.getElementById('healthVal').innerText = myHealth;
        document.getElementById('staminaVal').innerText = Math.floor(stamina);
        document.getElementById('playersOnline').innerText = Object.keys(players).length;
        let gold = inventory.gold || 0;
        document.getElementById('goldVal').innerText = gold;
        const invGrid = document.getElementById('invGrid');
        if(invGrid) invGrid.innerHTML = Object.entries(inventory).map(([k,v]) => `<div class="itemSlot">${k}: ${v}</div>`).join('');
    }
    
    function attack() {
        if(attackCooldown > 0 || stamina < currentWeapon.staminaCost) return;
        stamina -= currentWeapon.staminaCost;
        attackCooldown = 12;
        socket.emit('attack', { damage: currentWeapon.damage });
        updateUI();
    }
    
    setInterval(() => { if(stamina < 100) stamina = Math.min(100, stamina + 0.7); attackCooldown = Math.max(0, attackCooldown-1); updateUI(); }, 100);
    
    window.addEventListener('keydown', (e) => {
        let k = e.key.toLowerCase();
        if(keys.hasOwnProperty(k)) keys[k] = true;
        if(k === ' ' || k === 'space') { e.preventDefault(); attack(); }
        if(k === 'tab') { e.preventDefault(); document.getElementById('inventoryPanel').classList.toggle('open'); }
        if(k === 'c') { e.preventDefault(); document.getElementById('craftPanel').classList.toggle('open'); }
    });
    window.addEventListener('keyup', (e) => { let k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k] = false; });
    
    document.getElementById('closeInv').onclick = () => document.getElementById('inventoryPanel').classList.remove('open');
    document.getElementById('closeCraft').onclick = () => document.getElementById('craftPanel').classList.remove('open');
    
    setInterval(() => {
        let dx = (keys.d?1:0)-(keys.a?1:0), dy = (keys.s?1:0)-(keys.w?1:0);
        if(dx !== 0 || dy !== 0) socket.emit('move', { dx, dy });
    }, 50);
    
    socket.on('init', (data) => {
        myId = data.id; myX = data.x; myY = data.y; inventory = data.inventory; myHealth = data.health;
        updateUI();
        document.getElementById('joinScreen').style.display = 'none';
        document.getElementById('gameContainer').style.display = 'block';
        document.getElementById('onlineCountDisplay').innerText = `👥 онлайн: ${data.online}`;
        
        const craftList = [
            { name: 'Каменная кирка', req: { stone: 10 }, weapon: { name: 'Кирка', damage: 14, staminaCost: 12 } },
            { name: 'Золотая кирка', req: { gold: 8 }, weapon: { name: 'Золотая кирка', damage: 20, staminaCost: 14 } },
            { name: 'Кристальная кирка', req: { crystal: 6 }, weapon: { name: 'Кристальная кирка', damage: 28, staminaCost: 16 } },
            { name: 'Деревянный меч', req: { wood: 12 }, weapon: { name: 'Меч', damage: 18, staminaCost: 13 } },
            { name: 'Арбалет', req: { wood: 15, stone: 5 }, weapon: { name: 'Арбалет', damage: 26, staminaCost: 18 } }
        ];
        const craftDiv = document.getElementById('craftGrid');
        craftDiv.innerHTML = craftList.map(c => `<div class="itemSlot" data-req='${JSON.stringify(c.req)}' data-wep='${JSON.stringify(c.weapon)}'>${c.name}</div>`).join('');
        document.querySelectorAll('#craftGrid .itemSlot').forEach(el => {
            el.onclick = () => socket.emit('craft', { req: JSON.parse(el.dataset.req), weapon: JSON.parse(el.dataset.wep) });
        });
    });
    
    socket.on('updatePlayers', (data) => { players = data; });
    socket.on('updateWalls', (data) => { walls = data; });
    socket.on('updateResources', (data) => { resources = data; });
    socket.on('playerUpdate', (data) => { if(data.id === myId) { inventory = data.inventory; myHealth = data.health; updateUI(); } });
    socket.on('attackEffect', (data) => { if(data.target === myId) myHealth = data.newHealth; updateUI(); });
    
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(players[myId]) { myX = players[myId].x; myY = players[myId].y; cameraX = myX*TILE_SIZE - canvas.width/2; cameraY = myY*TILE_SIZE - canvas.height/2; }
        for(let i=0;i<35;i++) for(let j=0;j<25;j++) {
            let x = i*TILE_SIZE - cameraX, y = j*TILE_SIZE - cameraY;
            if(x+TILE_SIZE>0 && x<canvas.width && y+TILE_SIZE>0 && y<canvas.height) {
                ctx.fillStyle = (i+j)%2===0 ? '#3c7a3a' : '#4a8a42';
                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
            }
        }
        for(let r of resources) { let x = r.x*TILE_SIZE - cameraX, y = r.y*TILE_SIZE - cameraY; drawResource(ctx, r.type, x, y); }
        for(let w of walls) { let x = w.x*TILE_SIZE - cameraX, y = w.y*TILE_SIZE - cameraY; ctx.fillStyle = '#9a7a4a'; ctx.fillRect(x, y, TILE_SIZE-2, TILE_SIZE-2); }
        for(let id in players) { let p = players[id]; let x = p.x*TILE_SIZE - cameraX, y = p.y*TILE_SIZE - cameraY; drawPlayer(ctx, x, y, p.name || 'Slizer', p.health, id === myId); }
        requestAnimationFrame(draw);
    }
    draw();
    document.getElementById('playBtn').onclick = () => socket.emit('joinGame');
</script>
</body>
</html>
