<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slize | Survival 2D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #111; font-family: 'Segoe UI', monospace; }
        canvas { display: block; cursor: crosshair; }
        
        /* МЕНЮ */
        #menu { position: fixed; inset: 0; background: radial-gradient(#1a3a1a, #050a05); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        #menu h1 { color: #ffd966; font-size: 64px; text-shadow: 0 0 20px #aa5500; margin-bottom: 10px; }
        #menu input { padding: 12px; font-size: 18px; border-radius: 10px; border: 2px solid #ffd966; background: #0005; color: #fff; text-align: center; margin-bottom: 15px; width: 250px; }
        #menu button { background: #4a7a3a; color: #fff; border: none; padding: 12px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        #menu button:hover { background: #6a9a4a; transform: scale(1.05); }

        /* HUD */
        #hud { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; background: #000a; padding: 10px 20px; border-radius: 15px; border: 1px solid #fff2; }
        .bar { width: 120px; height: 14px; background: #333; border-radius: 7px; overflow: hidden; position: relative; }
        .bar span { position: absolute; width: 100%; text-align: center; color: #fff; font-size: 10px; line-height: 14px; z-index: 2; text-shadow: 1px 1px 0 #000; }
        .bar div { height: 100%; transition: width 0.2s; }
        #hpBar div { background: #ff3333; }
        #hungBar div { background: #ff9933; }

        /* ИНВЕНТАРЬ (TAB) */
        #invMenu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111a; backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 2px solid #ffd966; display: none; z-index: 50; min-width: 400px; }
        #invMenu h2 { color: #ffd966; text-align: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .slot { width: 60px; height: 60px; background: #222; border: 2px solid #444; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-size: 24px; cursor: pointer; position: relative; }
        .slot .count { position: absolute; bottom: 2px; right: 5px; font-size: 12px; color: #ffd966; font-weight: bold; }
        .slot.selected { border-color: #ffd966; background: #333; }

        /* КРАФТ (C) */
        #craftMenu { position: fixed; top: 50%; right: 20px; transform: translateY(-50%); background: #111a; backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 2px solid #44aaff; display: none; z-index: 50; min-width: 300px; }
        #craftMenu h2 { color: #44aaff; text-align: center; margin-bottom: 15px; }
        .recipe { background: #222; padding: 10px; margin-bottom: 8px; border-radius: 8px; color: #fff; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .recipe:hover { background: #444; }
        .recipe .req { font-size: 12px; color: #aaa; }

        /* ДЕНЬ/НОЧЬ */
        #nightOverlay { position: fixed; inset: 0; background: #000; pointer-events: none; z-index: 5; transition: opacity 0.5s; }
    </style>
</head>
<body>

<div id="menu">
    <h1>⚔️ SLIZE</h1>
    <input type="text" id="nickInput" placeholder="Ваш никнейм" maxlength="16">
    <button onclick="startGame()">▶ ИГРАТЬ</button>
</div>

<canvas id="c"></canvas>
<div id="nightOverlay"></div>

<div id="hud">
    <div>❤️<div class="bar" id="hpBar"><span>100</span><div style="width:100%"></div></div></div>
    <div>🍖<div class="bar" id="hungBar"><span>100</span><div style="width:100%"></div></div></div>
</div>

<div id="invMenu">
    <h2>🎒 Инвентарь (TAB)</h2>
    <div class="grid" id="invGrid"></div>
    <div style="color:#aaa; font-size:12px; margin-top:10px; text-align:center;">ПКМ по еде — съесть. ЛКМ по стене — строить.</div>
</div>

<div id="craftMenu">
    <h2>🔨 Крафт (C)</h2>
    <div id="craftList"></div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

let socket = null;
let myId = null;
let state = { players: {}, resources: [], buildings: [], mobs: [] };
let recipes = [];
let invOpen = false, craftOpen = false;
let selectedSlot = -1;
let keys = {};
let mouseAngle = 0;
let worldW = 200, worldH = 200;
const TILE = 48;

// Камера
let camX = 0, camY = 0;

function startGame() {
    const nick = document.getElementById('nickInput').value.trim() || 'Гость';
    document.getElementById('menu').style.display = 'none';
    socket = io();

    socket.on('init', (data) => {
        myId = data.id;
        worldW = data.worldW; worldH = data.worldH;
        recipes = data.recipes;
        renderCraftMenu();
    });

    socket.on('gameState', (newState) => {
        state = newState;
        updateHUD();
        updateNight();
    });
    
    socket.on('onlineCount', (c) => { /* Можно добавить в HUD */ });
}

// УПРАВЛЕНИЕ
window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'Tab') { e.preventDefault(); invOpen = !invOpen; document.getElementById('invMenu').style.display = invOpen ? 'block' : 'none'; renderInv(); }
    if (e.key.toLowerCase() === 'c') { craftOpen = !craftOpen; document.getElementById('craftMenu').style.display = craftOpen ? 'block' : 'none'; }
});
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
window.addEventListener('mousemove', (e) => {
    if (!myId || !state.players[myId]) return;
    const p = state.players[myId];
    const px = p.x * TILE - camX;
    const py = p.y * TILE - camY;
    mouseAngle = Math.atan2(e.clientY - py, e.clientX - px);
});
window.addEventListener('mousedown', (e) => {
    if (!socket || !myId) return;
    if (e.button === 0) { // ЛКМ
        if (invOpen && selectedSlot !== -1) {
            const item = state.players[myId].inventory[selectedSlot];
            if (item && (item.id === 'wall' || item.id === 'campfire')) {
                socket.emit('placeBuilding', { slotIndex: selectedSlot });
                return;
            }
        }
        socket.emit('attack');
    } else if (e.button === 2) { // ПКМ (есть)
        if (invOpen && selectedSlot !== -1) {
            const item = state.players[myId].inventory[selectedSlot];
            if (item && (item.id === 'berry' || item.id === 'meat')) {
                socket.emit('eat', item.id);
            }
        }
    }
});

// Отправка движения
setInterval(() => {
    if (!socket || !myId) return;
    let dx = 0, dy = 0;
    if (keys['w'] || keys['ц']) dy = -1;
    if (keys['s'] || keys['ы']) dy = 1;
    if (keys['a'] || keys['ф']) dx = -1;
    if (keys['d'] || keys['в']) dx = 1;
    socket.emit('move', { dx, dy, angle: mouseAngle });
}, 1000/30);

function updateHUD() {
    if (!myId || !state.players[myId]) return;
    const p = state.players[myId];
    const hpBar = document.getElementById('hpBar');
    const hungBar = document.getElementById('hungBar');
    hpBar.querySelector('div').style.width = p.hp + '%';
    hpBar.querySelector('span').innerText = Math.floor(p.hp);
    hungBar.querySelector('div').style.width = p.hunger + '%';
    hungBar.querySelector('span').innerText = Math.floor(p.hunger);
    if (invOpen) renderInv();
}

function updateNight() {
    const time = Date.now() / 1000;
    const nightLevel = (Math.sin(time / 30) + 1) / 2; // 0 - день, 1 - ночь
    document.getElementById('nightOverlay').style.opacity = nightLevel * 0.6;
}

function renderInv() {
    if (!myId || !state.players[myId]) return;
    const inv = state.players[myId].inventory;
    const grid = document.getElementById('invGrid');
    grid.innerHTML = '';
    const icons = { wood: '🪵', stone: '🪨', berry: '🫐', meat: '🥩', wall: '🧱', campfire: '🔥', wood_sword: '🗡️', pickaxe: '⛏️' };
    
    for (let i = 0; i < 20; i++) {
        const item = inv[i];
        const div = document.createElement('div');
        div.className = 'slot' + (selectedSlot === i ? ' selected' : '');
        div.onclick = () => { selectedSlot = i; renderInv(); };
        if (item) {
            div.innerHTML = `${icons[item.id] || '❓'}<span class="count">${item.count}</span>`;
        }
        grid.appendChild(div);
    }
}

function renderCraftMenu() {
    const list = document.getElementById('craftList');
    list.innerHTML = '';
    recipes.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'recipe';
        div.onclick = () => socket.emit('craft', i);
        const reqStr = r.req.map(x => `${x.item} x${x.count}`).join(', ');
        div.innerHTML = `<b>${r.name}</b><span class="req">${reqStr}</span>`;
        list.appendChild(div);
    });
}

// ОТРИСОВКА
function getBiomeColor(x, y) {
    if (x < 40 && y < 40) return ['#e8d4a0', '#d4c090']; // Пустыня
    if (x > 160 && y > 160) return ['#dce8f0', '#c8d8e4']; // Снег
    if (x > 80 && x < 120 && y > 80 && y < 120) return ['#2a5a1a', '#1e4a12']; // Лес
    return ['#4a8a2a', '#3e7a20']; // Равнины
}

function draw() {
    requestAnimationFrame(draw);
    if (!myId || !state.players[myId]) return;
    
    const p = state.players[myId];
    camX += (p.x * TILE - canvas.width/2 - camX) * 0.1;
    camY += (p.y * TILE - canvas.height/2 - camY) * 0.1;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camX, -camY);

    // Земля
    const startX = Math.max(0, Math.floor(camX / TILE));
    const startY = Math.max(0, Math.floor(camY / TILE));
    const endX = Math.min(worldW, Math.ceil((camX + canvas.width) / TILE) + 1);
    const endY = Math.min(worldH, Math.ceil((camY + canvas.height) / TILE) + 1);

    for (let x = startX; x < endX; x++) {
        for (let y = startY; y < endY; y++) {
            const colors = getBiomeColor(x, y);
            ctx.fillStyle = (x + y) % 2 === 0 ? colors[0] : colors[1];
            ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
        }
    }

    // Постройки
    for (let b of state.buildings) {
        if (b.type === 'wall') {
            ctx.fillStyle = '#6a4a2a';
            ctx.fillRect(b.x * TILE + 4, b.y * TILE + 4, TILE - 8, TILE - 8);
            ctx.fillStyle = '#8a6a4a';
            ctx.fillRect(b.x * TILE + 8, b.y * TILE + 8, TILE - 16, TILE - 16);
        } else if (b.type === 'campfire') {
            ctx.fillStyle = '#ff6622';
            ctx.beginPath();
            ctx.arc(b.x * TILE + TILE/2, b.y * TILE + TILE/2, 15, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.arc(b.x * TILE + TILE/2, b.y * TILE + TILE/2, 8, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // Ресурсы
    for (let r of state.resources) {
        const rx = r.x * TILE + TILE/2;
        const ry = r.y * TILE + TILE/2;
        
        ctx.save();
        ctx.translate(rx, ry);
        
        if (r.type === 'tree' || r.type === 'snow_tree') {
            ctx.fillStyle = '#4a2a0a';
            ctx.fillRect(-4, 0, 8, 20);
            ctx.fillStyle = r.type === 'snow_tree' ? '#ccddee' : '#1a6a0a';
            ctx.beginPath(); ctx.arc(0, -5, 15, 0, Math.PI*2); ctx.fill();
        } else if (r.type === 'stone') {
            ctx.fillStyle = '#888';
            ctx.beginPath(); ctx.arc(0, 5, 14, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#aaa';
            ctx.beginPath(); ctx.arc(-3, 2, 10, 0, Math.PI*2); ctx.fill();
        } else if (r.type === 'bush') {
            ctx.fillStyle = '#2a8a1a';
            ctx.beginPath(); ctx.arc(0, 5, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff4444';
            ctx.beginPath(); ctx.arc(3, 3, 3, 0, Math.PI*2); ctx.fill(); // ягода
        } else if (r.type === 'cactus') {
            ctx.fillStyle = '#2a6a1a';
            ctx.fillRect(-4, -10, 8, 25);
            ctx.fillRect(-10, -5, 6, 10);
            ctx.fillRect(4, 0, 6, 10);
        }
        ctx.restore();
    }

    // Мобы
    for (let m of state.mobs) {
        const mx = m.x * TILE + TILE/2;
        const my = m.y * TILE + TILE/2;
        ctx.save();
        ctx.translate(mx, my);
        ctx.rotate(m.angle);
        
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI*2); ctx.fill(); // Тело
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(18, -5); ctx.lineTo(18, 5); ctx.fill(); // Морда
        
        // Глаза
        ctx.fillStyle = '#ff0';
        ctx.beginPath(); ctx.arc(10, -3, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(10, 3, 2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    // Игроки
    for (let id in state.players) {
        const pl = state.players[id];
        const px = pl.x * TILE + TILE/2;
        const py = pl.y * TILE + TILE/2;
        const isMe = id === myId;
        const legOff = Math.sin(pl.moveAnim) * 4;

        ctx.save();
        ctx.translate(px, py);
        
        // Тело
        ctx.fillStyle = isMe ? '#ffcc88' : '#e09a5a';
        ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
        
        // Ноги
        ctx.fillStyle = '#4a2a1a';
        ctx.fillRect(-5, 10, 4, 8 + legOff);
        ctx.fillRect(1, 10, 4, 8 - legOff);

        // Рука с оружием
        ctx.save();
        ctx.rotate(pl.angle);
        ctx.fillStyle = '#ffcc88';
        ctx.fillRect(8, -3, 8, 6); // Рука
        
        if (pl.isAttacking) ctx.rotate(0.5); // Взмах
        
        if (pl.equip === 'wood_sword') {
            ctx.fillStyle = '#aa8844';
            ctx.fillRect(16, -2, 14, 4);
        } else if (pl.equip === 'pickaxe') {
            ctx.fillStyle = '#888';
            ctx.fillRect(16, -2, 12, 4);
        }
        ctx.restore();

        // Имя и ХП
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(pl.name, 0, -20);
        
        ctx.fillStyle = '#333';
        ctx.fillRect(-15, -16, 30, 4);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(-15, -16, 30 * (pl.hp / pl.maxHp), 4);

        ctx.restore();
    }

    ctx.restore();
}

draw();
</script>
</body>
</html>
